name: Update Shanghai House Price Chart

on:
  workflow_dispatch:
  schedule:
    # Runs on the 20th of every month at 10:30 China/Perth time.
    - cron: "30 2 20 * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Rebuild data and pages
        run: |
          python build_shanghai_house_price_data.py
          python make_single_file.py

      - name: Commit regenerated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shanghai-house-price-data.js shanghai-house-price-kline-single.html index.html
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Shanghai house price data"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
